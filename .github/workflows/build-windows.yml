name: Build Windows installer

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -A x64 -DCOPY_PLUGIN=OFF

      - name: Build Release
        run: cmake --build build --config Release

      - name: Make installer (Inno Setup)
        run: iscc installer\windows.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: MixChecker-Windows-Installer
          path: installer/Output/MixChecker-Setup.exe
